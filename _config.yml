theme: jekyll-theme-chirpy

lang: en
timezone: America/New_York

title: Jason Johnson
tagline: Ham Radio Operator & Software Developer
description: >-
  K3JSJ — Extra class ham radio operator focused on digital modes,
  emergency communications, and amateur radio software development.

url: "https://k3jsj.net"
baseurl: ""

github:
  username: VikingNation

social:
  name: Jason Johnson
  email: k3jsj@arrl.net
  links:
    - https://github.com/VikingNation
    - https://www.youtube.com/@K3JSJ

avatar: "https://2.gravatar.com/avatar/2c82b92b152098d1d888f6990486d99b?size=256"

# Google Analytics
google_analytics:
  id: "G-L2RPMWZVFJ"

# GoatCounter — injected via _includes/head.html
goatcounter: k3jsj-net

# Comments (leave active empty to disable)
comments:
  active: ""

# Chirpy table of contents on posts
toc: true

permalink: /:title/

# Register _tabs/ as a collection so Chirpy sidebar tabs render at correct URLs
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

sass:
  style: compressed

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-archives

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

paginate: 10
paginate_path: /page:num/

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME
  - SITE_REVIEW.md
  - node_modules
  - "*.gemspec"
